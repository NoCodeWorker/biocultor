# ─────────────────────────────────────────────────────────────────────
#  Biocultor — Stack de producción (Next.js + PostgreSQL)
# ─────────────────────────────────────────────────────────────────────
#  Traefik existente en el VPS corre en network_mode: host
#  → descubre nuestros contenedores por Docker socket y los alcanza
#    a través de las IPs bridge (docker0). No hace falta red externa
#    compartida; sí labels con el rule + certresolver (letsencrypt).
# ─────────────────────────────────────────────────────────────────────

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      # BuildKit solo acepta `host|none|default` como network para los RUN.
      # Con el builder de buildx en modo docker-container adjunto a
      # `biocultor_internal` (ver DEPLOY.md § 9 — Setup de una vez), `host`
      # aquí significa "la red del contenedor builder", es decir, la propia
      # `biocultor_internal`. Así los RUN pueden resolver `db:5432`.
      network: host
      args:
        # Compose lee DATABASE_URL del .env raíz del proyecto (mismo que usa
        # env_file en runtime). Con esto Next puede pre-renderizar en build
        # las páginas con ISR que consultan Prisma.
        DATABASE_URL: ${DATABASE_URL}
    image: biocultor-web:latest
    container_name: biocultor-web
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    expose:
      - "3000"
    volumes:
      # Persistencia de imágenes subidas desde /admin. Sin esto, los archivos
      # de /public/uploads se borran en cada `docker compose build`. El bind
      # mount apunta a /opt/biocultor/uploads en el host.
      - ./uploads:/app/public/uploads
    # `migrate deploy` aplica solo migraciones pendientes y nunca borra datos
    # silenciosamente. Si una migración futura intentaría perder datos, falla
    # y el contenedor no arranca — alerta antes que silencio.
    # Para el primer arranque tras este cambio hay que hacer un baseline en
    # el VPS (ver DEPLOY.md sección "Baseline tras switch a migrate deploy").
    command: >
      sh -c "node node_modules/prisma/build/index.js migrate deploy && node server.js"
    labels:
      - "traefik.enable=true"
      # Apex + www por HTTP → redirige a HTTPS
      - "traefik.http.routers.biocultor-http.rule=Host(`biocultor.com`) || Host(`www.biocultor.com`)"
      - "traefik.http.routers.biocultor-http.entrypoints=web"
      - "traefik.http.routers.biocultor-http.middlewares=biocultor-redirect"
      - "traefik.http.middlewares.biocultor-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.biocultor-redirect.redirectscheme.permanent=true"
      # HTTPS: sirve biocultor.com y www.biocultor.com
      - "traefik.http.routers.biocultor.rule=Host(`biocultor.com`) || Host(`www.biocultor.com`)"
      - "traefik.http.routers.biocultor.entrypoints=websecure"
      - "traefik.http.routers.biocultor.tls=true"
      - "traefik.http.routers.biocultor.tls.certresolver=letsencrypt"
      - "traefik.http.services.biocultor.loadbalancer.server.port=3000"
      # www → apex (301 permanente)
      - "traefik.http.routers.biocultor.middlewares=biocultor-wwwredirect"
      - "traefik.http.middlewares.biocultor-wwwredirect.redirectregex.regex=^https://www\\.biocultor\\.com/(.*)"
      - "traefik.http.middlewares.biocultor-wwwredirect.redirectregex.replacement=https://biocultor.com/$${1}"
      - "traefik.http.middlewares.biocultor-wwwredirect.redirectregex.permanent=true"

  db:
    image: postgres:16-alpine
    container_name: biocultor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - biocultor-db-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  biocultor-db-data:

networks:
  internal:
    driver: bridge
